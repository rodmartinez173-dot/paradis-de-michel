let currentLang = localStorage.getItem('lang') || 'fr';

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function render() {
  const t = I18N[currentLang];
  document.documentElement.lang = currentLang;
  document.title = t.htmlTitle;

  document.getElementById('t-surtitre').textContent = t.surtitre;
  document.getElementById('t-titre').textContent = t.titre;
  document.getElementById('t-devise').textContent = t.devise;
  document.getElementById('tab-accueil').textContent = t.tabs[0];
  document.getElementById('tab-celebres').textContent = t.tabs[1];
  document.getElementById('tab-chansons').textContent = t.tabs[2];
  document.getElementById('tab-course').textContent = t.tabCourse;
  document.getElementById('t-bandeau-titre').textContent = t.bandeauTitre;
  document.getElementById('t-bandeau-sous').textContent = t.bandeauSous;
  document.getElementById('t-bandeau-btn').textContent = t.bandeauBtn;
  // Le bandeau d'invitation disparaît si une session Supabase existe déjà sur cet appareil
  if (localStorage.getItem('sb-nyprqinjxwlmoyatvbpp-auth-token')) {
    document.getElementById('bandeau-course').style.display = 'none';
  }
  document.getElementById('t-accueil-h2').textContent = t.accueilH2;
  document.getElementById('t-accueil-intro').textContent = t.accueilIntro;
  document.getElementById('t-citation').textContent = t.citation;
  document.getElementById('t-celebres-h2').textContent = t.celebresH2;
  document.getElementById('t-celebres-intro').textContent = t.celebresIntro;
  document.getElementById('t-chansons-h2').textContent = t.chansonsH2;
  document.getElementById('t-chansons-intro').textContent = t.chansonsIntro;
  document.getElementById('t-footer-logo').textContent = t.titre;
  document.getElementById('t-footer-note').textContent = t.footerNote;

  document.getElementById('galerie').innerHTML = t.photos.map(function (p, i) {
    return '<figure style="transform: rotate(' + PHOTOS[i].tilt + ');">' +
      '<img src="' + PHOTOS[i].src + '" alt="' + esc(p.titre) + '">' +
      '<figcaption>' +
        '<span class="photo-titre">' + esc(p.titre) + '</span>' +
        '<span class="photo-legende">' + esc(p.legende) + '</span>' +
      '</figcaption></figure>';
  }).join('');

  document.getElementById('celebres').innerHTML = t.celebres.map(function (m, i) {
    const numero = (i + 1) < 10 ? '0' + (i + 1) : String(i + 1);
    return '<article>' +
      '<div class="celebre-entete">' +
        '<span class="celebre-numero">' + numero + '</span>' +
        '<div><h3>' + esc(m.nom) + '</h3>' +
        '<span class="celebre-metier">' + esc(m.metier) + '</span></div>' +
      '</div>' +
      '<p class="celebre-bio">' + esc(m.bio) + '</p>' +
      '<div class="anecdote">' +
        '<span class="anecdote-label">' + esc(t.anecdoteLabel) + '</span>' +
        '<p>' + esc(m.anecdote) + '</p>' +
      '</div></article>';
  }).join('');

  document.getElementById('chansons').innerHTML = t.chansons.map(function (c, i) {
    return '<article>' +
      '<div class="chanson-entete">' +
        '<h3>' + esc(c.titre) + '</h3>' +
        '<span class="chanson-artiste">' + esc(c.artiste) + '</span>' +
      '</div>' +
      '<p class="chanson-histoire">' + esc(c.histoire) + '</p>' +
      '<div class="video"><iframe src="' + EMBEDS[i] + '" title="' + esc(c.titre) + '" loading="lazy" ' +
        'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>' +
      '</article>';
  }).join('');

  document.querySelectorAll('.langues button').forEach(function (b) { b.classList.remove('active'); });
  document.getElementById('lang-' + currentLang).classList.add('active');
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  render();
}

function showPage(page, btn) {
  document.querySelectorAll('.page').forEach(function (p) { p.classList.remove('visible'); });
  document.getElementById('page-' + page).classList.add('visible');
  document.querySelectorAll('nav button').forEach(function (b) { b.classList.remove('active'); });
  btn.classList.add('active');
  window.scrollTo({ top: 0 });
}

render();
</script>
